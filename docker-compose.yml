version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: unaria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unaria
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unaria_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unaria -d unaria_db']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unaria_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://unaria:password@db:5432/unaria_db
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
